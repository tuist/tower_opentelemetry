name: Blick Review

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  review:
    name: Review
    # Forked PRs don't have access to repo secrets and shouldn't be exposed
    # to an LLM agent that can read the codebase.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1

      - name: Install blick
        run: mise use -g github:tuist/blick

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run blick review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: blick review --base "origin/${{ github.event.pull_request.base.ref }}"

      - name: Publish to the PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: blick publish
