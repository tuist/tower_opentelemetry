name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-release:
    name: Check for releasable changes
    runs-on: ubuntu-24.04
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      next-version: ${{ steps.check.outputs.next-version }}
      next-version-number: ${{ steps.check.outputs.next-version-number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          install_args: "git-cliff"
          cache: "false"

      - name: Check for releasable changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            CHANGELOG=$(git cliff --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD || echo "")
          else
            CHANGELOG=$(git cliff --repository "." 2>/dev/null || echo "")
          fi

          if echo "$CHANGELOG" | sed -n '/<!-- RELEASE NOTES START -->/,/<!-- generated by git-cliff -->/p' | grep -qE '^\*'; then
            if [ -n "$LATEST_VERSION" ]; then
              NEXT_VERSION=$(git cliff --repository "." --bumped-version 2>/dev/null -- ${LATEST_VERSION}..HEAD)
            else
              NEXT_VERSION=$(git cliff --repository "." --bumped-version 2>/dev/null)
            fi
          else
            if [ -n "$LATEST_VERSION" ]; then
              NEXT_VERSION="${LATEST_VERSION#v}"
            else
              NEXT_VERSION="0.1.0"
            fi
          fi

          # Normalize to v-prefixed tag
          NEXT_VERSION_NUM="${NEXT_VERSION#v}"
          NEXT_VERSION="v${NEXT_VERSION_NUM}"

          echo "Latest version: ${LATEST_VERSION:-none}"
          echo "Next version: $NEXT_VERSION"

          if [ "$LATEST_VERSION" != "$NEXT_VERSION" ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "next-version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "next-version-number=$NEXT_VERSION_NUM" >> "$GITHUB_OUTPUT"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "next-version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "next-version-number=${LATEST_VERSION#v}" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release
    needs: check-release
    if: needs.check-release.outputs.should-release == 'true'
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: jdx/mise-action@v4.0.1
        with:
          install_args: "erlang elixir git-cliff"
          cache: "false"

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update version in mix.exs
        run: |
          sed -i 's/@version ".*"/@version "${{ needs.check-release.outputs.next-version-number }}"/' mix.exs

      - name: Update CHANGELOG.md
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            git cliff --repository "." --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff --repository "." --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Install dependencies
        run: mix deps.get

      - name: Publish to hex.pm
        run: mix hex.publish --yes --replace
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mix.exs CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: release ${{ needs.check-release.outputs.next-version }}"
          fi
          git tag ${{ needs.check-release.outputs.next-version }}
          git push origin HEAD:main
          git push origin ${{ needs.check-release.outputs.next-version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          name: ${{ needs.check-release.outputs.next-version-number }}
          tag_name: ${{ needs.check-release.outputs.next-version }}
          body: |
            hex.pm: https://hex.pm/packages/tower_opentelemetry/${{ needs.check-release.outputs.next-version-number }}

            ${{ steps.release-notes.outputs.RELEASE_NOTES }}
