name: blick

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: blick-${{ github.head_ref }}
  cancel-in-progress: true

env:
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  review:
    name: Review
    # Forked PRs don't have access to repo secrets and shouldn't be exposed
    # to an LLM agent that can read the codebase. Drafts are skipped too.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1

      - name: Install blick and opencode
        run: |
          mise use -g github:tuist/blick
          mise use -g npm:opencode-ai

      - name: Run blick review
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: blick review --base "origin/${{ github.event.pull_request.base.ref }}" --json --stream

      - name: Publish review
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: blick publish

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blick-runs
          path: .blick/runs/
          if-no-files-found: ignore
